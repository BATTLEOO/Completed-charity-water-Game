<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="brand-header" aria-label="charity water branding">
            <img class="brand-logo" src="img/cw_logo-horizontal.png" alt="charity: water logo">
        </header>
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">
            Catch the <span class="tagline-good">good drops</span>, avoid the <span class="tagline-bad">bad ones</span>!
        </p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="goal">Goal: <span id="target-score">20</span></div>
            <div class="challenge">Challenge: <span id="challenge-status">Calm</span></div>
            <div class="difficulty-control">
                <label for="difficulty-select">Mode</label>
                <select id="difficulty-select" aria-label="Select difficulty mode">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <button id="start-btn">Start Game</button>
            <button id="reset-btn">Reset</button>
        </div>
        <p id="feedback-message" class="feedback-message">
            <img class="feedback-icon" src="img/water-can-transparent.png" alt="Water can icon">
            <span>Tap clean drops to score. Avoid dirty drops.</span>
        </p>
        
        <div id="game-container">
        </div>
        <div id="celebration-overlay" class="celebration-overlay" aria-live="polite" aria-atomic="true"></div>

        <footer class="game-footer" aria-label="charity water links">
            <p class="footer-copy">Support clean water with charity: water.</p>
            <div class="footer-links">
                <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">Visit charity: water</a>
                <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate now</a>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
